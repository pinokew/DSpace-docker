name: DSpace CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dspace-ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  SHELLCHECK_IMAGE: koalaman/shellcheck@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d
  TRIVY_IMAGE: aquasec/trivy@sha256:3d1f862cb6c4fe13c1506f96f816096030d8d5ccdb2380a3069f7bf07daa86aa

  DEPLOY_PROJECT_DIR: /home/pinokew/Dspace/DSpace-docker
  DEPLOY_BRANCH: main
  DEPLOY_COMPOSE_FILE: docker-compose.yml

jobs:
  ci-checks:
    name: ci-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Pull CI utility images
        run: |
          set -euo pipefail
          docker pull "${SHELLCHECK_IMAGE}"
          docker pull "${TRIVY_IMAGE}"

      - name: Shellcheck
        run: |
          set -euo pipefail
          mapfile -t files < <(find scripts -type f -name '*.sh' | sort)
          [ "${#files[@]}" -gt 0 ] || { echo "No shell scripts found under scripts/"; exit 1; }
          docker run --rm -v "$PWD:/work" -w /work "${SHELLCHECK_IMAGE}" \
            -x -e SC1090,SC1091,SC2034,SC2046,SC2086,SC2155 "${files[@]}"

      - name: Compose validation
        run: |
          set -euo pipefail
          cp example.env .env
          docker compose -f docker-compose.yml --env-file .env config -q

          docker compose -f docker-compose.yml --env-file .env config \
            | grep -n "\${" && { echo "❌ Unresolved variables found in rendered compose"; exit 1; } || true

          echo "✅ docker-compose.yml is valid."

      - name: Env validation (CI mock)
        run: |
          set -euo pipefail
          chmod +x scripts/verify-env.sh
          ./scripts/verify-env.sh --ci-mock

      - name: Config patching dry-run
        run: |
          set -euo pipefail
          mkdir -p dspace/config
          touch dspace/config/local.cfg
          cp example.env .env

          chmod +x scripts/patch-local.cfg.sh
          ./scripts/patch-local.cfg.sh

          echo "✅ Patching script executed without errors."

      - name: Trivy Config Scan (Critical gate)
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/work" -w /work "${TRIVY_IMAGE}" \
            config --skip-check-update --exit-code 1 --severity CRITICAL /work

  cd-deploy:
    name: cd-deploy
    needs: ci-checks
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: dspace-prod-deploy
      cancel-in-progress: false
    env:
      DEPLOY_FULL_REF: ${{ github.ref }}
      DEPLOY_REF: ${{ github.ref_name }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          [ -n "${{ secrets.SERVER_HOST }}" ] || { echo "Missing secret: SERVER_HOST"; exit 1; }
          [ -n "${{ secrets.SERVER_USER }}" ] || { echo "Missing secret: SERVER_USER"; exit 1; }
          [ -n "${{ secrets.SERVER_SSH_KEY }}" ] || { echo "Missing secret: SERVER_SSH_KEY"; exit 1; }

      - name: Connect to Tailscale
        if: env.TAILSCALE_AUTHKEY != ''
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DEPLOY_FULL_REF,DEPLOY_REF,DEPLOY_PROJECT_DIR,DEPLOY_BRANCH,DEPLOY_COMPOSE_FILE
          script: |
            set -euo pipefail

            echo "Starting deployment for ${DEPLOY_REF} (${DEPLOY_FULL_REF})"
            cd "${DEPLOY_PROJECT_DIR}"

            if [ ! -f .env ]; then
              echo "❌ ERROR: .env not found in ${DEPLOY_PROJECT_DIR}. SSOT is missing."
              exit 1
            fi

            git fetch --prune --tags origin

            case "${DEPLOY_FULL_REF}" in
              refs/tags/*)
                echo "Deploying tag: ${DEPLOY_REF}"
                git checkout -f "${DEPLOY_REF}"
                ;;
              *)
                echo "Deploying branch: ${DEPLOY_BRANCH}"
                git checkout -f "${DEPLOY_BRANCH}"
                git reset --hard "origin/${DEPLOY_BRANCH}"
                ;;
            esac

            chmod +x scripts/*.sh || true

            chmod +x scripts/patch-local.cfg.sh
            ./scripts/patch-local.cfg.sh

            docker compose -f "${DEPLOY_COMPOSE_FILE}" pull
            docker compose -f "${DEPLOY_COMPOSE_FILE}" up -d --remove-orphans

            chmod +x scripts/smoke-test.sh
            ./scripts/smoke-test.sh || {
              echo "---- docker compose ps ----"
              docker compose -f "${DEPLOY_COMPOSE_FILE}" ps || true

              echo "---- dspace logs ----"
              docker logs --tail=120 dspace || true

              echo "---- traefik logs ----"
              docker logs --tail=120 dspace-traefik || true

              echo "---- solr logs ----"
              docker logs --tail=120 dspacesolr || true

              exit 1
            }

            echo "✅ DEPLOY OK"
